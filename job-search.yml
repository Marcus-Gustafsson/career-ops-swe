    tracked_companies:
      - name: Neko Health
        provider: ashby
        careers_url: https://jobs.ashbyhq.com/neko-health
        location_note: Stockholm HQ and hardware development; also London/Berlin and remote-first software teams.
        company_note: Preventative healthcare company building non-invasive health scans with custom medical hardware, software, firmware, data, and clinical operations.
        fit_note: Strong fit for regulated healthtech, firmware/software/data, verification, and medical-device-adjacent engineering; many roles may be senior.
      - name: Tandem Health
        provider: ashby
        careers_url: https://jobs.ashbyhq.com/tandem-health
        location_note: Stockholm HQ, mostly on-site for product and engineering roles.
        company_note: AI healthtech company building clinician-first documentation and workflow tools for healthcare.
        fit_note: Strong fit for software/platform/product engineering in healthcare; less classic medical device, more healthtech/SaaS.
