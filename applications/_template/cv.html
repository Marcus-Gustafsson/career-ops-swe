<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{NAME}} - CV - {{ROLE}}</title>
  <style>
    @font-face {
      font-family: "Space Grotesk";
      src: url("../../templates/fonts/space-grotesk-latin.woff2") format("woff2");
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "DM Sans";
      src: url("../../templates/fonts/dm-sans-latin.woff2") format("woff2");
      font-weight: 100 1000;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html {
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    body {
      margin: 0;
      background: #fff;
      color: #1f2230;
      font-family: "DM Sans", Arial, sans-serif;
      font-size: 10.5px;
      line-height: 1.42;
    }

    .page {
      width: 100%;
      max-width: 210mm;
      margin: 0 auto;
    }

    h1,
    h2,
    h3 {
      font-family: "Space Grotesk", Arial, sans-serif;
    }
  </style>
</head>
<body>
  <main class="page">
    <!-- Replace this placeholder with company-free tailored CV content. Use only facts from personal/.
         Do not mention the target company in visible CV text or <title> metadata.
         Work/project descriptions should use one <li> each, with <br> for readable line breaks when needed. -->
    <h1>{{NAME}}</h1>
  </main>
</body>
</html>
