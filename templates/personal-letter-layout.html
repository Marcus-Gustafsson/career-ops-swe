<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    @font-face {
      font-family: "Space Grotesk";
      src: url("./fonts/space-grotesk-latin.woff2") format("woff2");
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Space Grotesk";
      src: url("./fonts/space-grotesk-latin-ext.woff2") format("woff2");
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "DM Sans";
      src: url("./fonts/dm-sans-latin.woff2") format("woff2");
      font-weight: 100 1000;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "DM Sans";
      src: url("./fonts/dm-sans-latin-ext.woff2") format("woff2");
      font-weight: 100 1000;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html {
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    body {
      margin: 0;
      background: #fff;
      color: #202432;
      font-family: "DM Sans", Arial, sans-serif;
      font-size: 11.2px;
      line-height: 1.58;
    }

    .page {
      width: 100%;
      max-width: 210mm;
      margin: 0 auto;
    }

    .topline {
      height: 2px;
      margin-bottom: 16px;
      border-radius: 999px;
      background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    }

    .sender {
      margin-bottom: 19px;
    }

    h1 {
      margin: 0 0 5px;
      color: #181b2a;
      font-family: "Space Grotesk", Arial, sans-serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.08;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 11px;
      color: #50586a;
      font-size: 9.8px;
    }

    a {
      color: inherit;
      text-decoration: none;
      white-space: nowrap;
    }

    .letter-meta {
      margin-bottom: 18px;
      color: #4b5262;
      font-size: 10.5px;
    }

    p {
      margin: 0 0 11px;
    }

    .signature {
      margin-top: 20px;
    }

    .name {
      color: hsl(270, 70%, 39%);
      font-family: "Space Grotesk", Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
    }

    .note {
      margin-top: 24px;
      border-top: 1px solid #e3e5ea;
      padding-top: 8px;
      color: #6a7180;
      font-size: 9.4px;
    }
  </style>
</head>
<body>
  <main class="page">
    {{BODY}}
  </main>
</body>
</html>
